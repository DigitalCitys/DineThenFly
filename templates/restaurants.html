    </ul>

<script>
    fetch('http://127.0.0.1:5000/api/restaurants')
    .then(response => response.json())
    .then(restaurants => {
        const restaurantlist = document.getElementById('listofrestaurants'); // Finds empty tbody in HTML by id
        for(var i = 0; i < restaurants.length; i++)
        {
            const restaurant = document.createElement('li');
            restaurant.classList.add('restaurant');
            restaurant.innerHTML = `
                <h3>${restaurants[i].name}</h3>
                <p>${restaurants[i].location}</p>
                <p>${restaurants[i].times}</p>
                <a href="${restaurants[i].menulink}">Menu</a>
            `;
            restaurantlist.appendChild(restaurant);
        }
    })
</script>
</body>
